name: Build & Push to gcr.io via Cloud Build

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: read
  id-token: write   # required for OIDC to GCP

env:
  GCP_PROJECT_ID: proven-country-485607-p6
  GCP_PROJECT_NUMBER: 766156983150
  WIF_POOL_ID: github-wif-pool
  WIF_PROVIDER_ID: github
  GCP_SA_EMAIL: github-wif-sa@proven-country-485607-p6.iam.gserviceaccount.com
  IMAGE_NAME: ${{ vars.IMAGE_NAME || 'supermart-iot-api' }}
  GCR_HOST: ${{ vars.GCR_HOST || 'gcr.io' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) OIDC auth → short-lived credentials (no long-lived service account keys)
      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ env.WIF_POOL_ID }}/providers/${{ env.WIF_PROVIDER_ID }}
          service_account: ${{ env.GCP_SA_EMAIL }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform

      # 2) Install gcloud
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: ">= 466.0.0"

      # 3) Enable required APIs (idempotent)
      - name: Enable required APIs
        run: |
          set -euo pipefail
          gcloud --quiet services enable \
            artifactregistry.googleapis.com \
            cloudbuild.googleapis.com \
            cloudresourcemanager.googleapis.com \
            sqladmin.googleapis.com \
            run.googleapis.com

      # 4) Ensure gcr.io-style Artifact Registry repo exists
      - name: Ensure gcr.io repo exists in Artifact Registry
        run: |
          set -euo pipefail
          case "${GCR_HOST}" in
            gcr.io|us.gcr.io) AR_LOCATION="us";     AR_REPO="gcr.io";;
            eu.gcr.io)        AR_LOCATION="europe";  AR_REPO="eu.gcr.io";;
            asia.gcr.io)      AR_LOCATION="asia";    AR_REPO="asia.gcr.io";;
            *) echo "Unsupported GCR_HOST=${GCR_HOST}"; exit 1;;
          esac
          if ! gcloud artifacts repositories describe "${AR_REPO}" --location="${AR_LOCATION}" >/dev/null 2>&1; then
            gcloud artifacts repositories create "${AR_REPO}" \
              --location="${AR_LOCATION}" \
              --repository-format=docker \
              --description="Backs ${GCR_HOST} for this project"
          fi

      # 5) Enable gcr.io → Artifact Registry redirection
      - name: Enable gcr.io redirection
        run: |
          gcloud artifacts settings enable-upgrade-redirection \
            --project="${GCP_PROJECT_ID}" --quiet || true

      # 6) Compute short Git SHA tag
      - name: Compute image tag
        id: tag
        run: echo "TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      # 7) Configure Docker credential helper for gcr.io
      - name: Configure Docker auth for gcr.io
        run: gcloud auth configure-docker ${GCR_HOST} --quiet

      # 8) Docker build & push — context is ./supermart-iot (Spring Boot service)
      - name: Docker build & push
        run: |
          set -euo pipefail
          IMAGE_REF="${GCR_HOST}/${GCP_PROJECT_ID}/${IMAGE_NAME}:${TAG}"
          echo "Building ${IMAGE_REF} from ./supermart-iot ..."
          docker build -t "${IMAGE_REF}" --no-cache ./supermart-iot
          echo "Pushing ${IMAGE_REF} ..."
          docker push "${IMAGE_REF}"
          echo "pushed=${IMAGE_REF}" >> $GITHUB_OUTPUT

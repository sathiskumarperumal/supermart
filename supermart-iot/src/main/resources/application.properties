# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ─── DataSource (H2 in-memory for dev) ────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:supermartdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# spring.jpa.database-platform intentionally omitted — Hibernate 6 auto-detects
# H2Dialect from the JDBC URL (explicit setting causes HHH90000025 WARN).
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── H2 Console (dev only) ────────────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JWT ──────────────────────────────────────────────────────────────────────
# SCRUM-3: Access token expiration set to 45 minutes (2700000 ms) to align with
#           OWASP A07 session management recommendations and reduce the exposure
#           window for compromised tokens.
# In all cloud runtimes set APP_JWT_SECRET as a secure environment variable.
# Never commit a real secret — the placeholder below is for local dev only.
app.jwt.secret=${APP_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.access-token-expiration-ms=${APP_JWT_EXPIRY_MS:2700000}
app.jwt.refresh-token-expiration-ms=${APP_JWT_REFRESH_EXPIRY_MS:86400000}

# ─── CORS ─────────────────────────────────────────────────────────────────────
# Reads APP_CORS_ALLOWED_ORIGINS env var first; falls back to localhost for local dev.
# In cloud runtimes (ECS, Cloud Run, AKS, etc.) set APP_CORS_ALLOWED_ORIGINS as
# an environment variable containing the real frontend domain(s).
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

# ─── Telemetry rate limit ─────────────────────────────────────────────────────
app.telemetry.rate-limit-per-minute=2

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.supermart=DEBUG
logging.level.org.springframework.security=INFO

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ─── SpringDoc / Swagger ──────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
